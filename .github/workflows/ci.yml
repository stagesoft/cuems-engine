name: CI

on:
  push:
    branches: [main, rc_1]
  pull_request:
    branches: [main, rc_1]
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Load cached virtualenv
        id: cache-venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-3.11-${{ hashFiles('**/poetry.lock') }}

      - name: Install dependencies
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: poetry install --with dev --no-interaction

      - name: black
        run: poetry run black --check src/ tests/

      - name: isort
        run: poetry run isort --check src/ tests/

      - name: flake8
        run: poetry run flake8 src/ # PEP8 compliance for shipped code

  test:
    name: Tests
    runs-on: ubuntu-22.04
    needs: lint
    permissions:
      contents: write   # required to push the coverage badge to gh-pages

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: ">=3.11 <3.12"

      - name: Install system packages
        run: |
          sudo apt-get install -y --no-install-recommends \
            libjack-jackd2-dev \
            python3-systemd \
            wget
          sudo wget https://github.com/stagesoft/libossia/releases/download/v2.0.0rc6/python3-pyossia_2.0.0-rc6+124+cuems2_amd64.deb -O python3-pyossia.deb
          sudo apt install -y $(realpath python3-pyossia.deb)

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Load cached virtualenv
        id: cache-venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-3.11-${{ hashFiles('**/poetry.lock') }}

      - name: Install dependencies
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: poetry install --with dev --no-interaction

      - name: Unit tests
        run: |
          poetry run pytest \
            -m "not integration" \
            -n auto \
            --cov=src \
            --cov-report=term-missing \
            --cov-fail-under=45

      - name: Integration tests
        run: |
          poetry run pytest \
            -m integration \
            --cov=src \
            --cov-append \
            --cov-report=term-missing

      - name: Generate XML coverage report
        run: poetry run coverage xml -o coverage.xml

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: |
            .coverage
            coverage.xml

      - name: Generate coverage badge
        if: github.event_name == 'push'
        run: |
          pip install "genbadge[coverage]"
          mkdir -p _badge
          genbadge coverage -i coverage.xml -o _badge/coverage.svg

      - name: Deploy coverage badge to GitHub Pages
        if: github.event_name == 'push'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: _badge
          target-folder: badges
          clean: false
