# Installed by cuems-engine-mock. Prepends the mock-bin dir (containing the
# no-op rsync shim) to cuems-node-engine PATH so CuemsDeploy bare `rsync`
# resolves to the shim. Standard service PATH retained after it.
[Service]
Environment=PATH=/usr/lib/cuems/mock-bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
