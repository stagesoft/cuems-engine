[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "cuemsengine"
dynamic = ["version"]
description = "Engine infraestructure of the CueMS system"
readme = "README.md"
requires-python = ">=3.11"
license = "GPL-3.0"
keywords = []
authors = [
  { name = "Ion Reguera", email = "ion@stagelab.com" },
  { name = "Adrià Masip", email = "adria.back@gmail.com" },
]
classifiers = [
  "Development Status :: 4 - Beta",
  "Programming Language :: Python",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: Implementation :: CPython",
  "Programming Language :: Python :: Implementation :: PyPy",
]
dependencies = [
    "cuemsutils @ file:///disk/Projects/StageLab/cuems-utils/dist/cuemsutils-0.0.9rc3-py3-none-any.whl#sha1=204ff7ad4ed4a71762f73a32bad93da95a092676",
    "mido==1.3.3",
    "python-rtmidi",
    "python-daemon==3.1.2",
    "python-osc==1.9.3",
]

[project.urls]
Documentation = "https://github.com/stagesoft/cuems-engine#readme"
Issues = "https://github.com/stagesoft/cuems-engine/issues"
Source = "https://github.com/stagesoft/cuems-engine"

[project.scripts]
node-engine = "scripts.node_engine:main"
controller-engine = "scripts.controller_engine:main"

[tool.hatch.version]
path = "src/cuemsengine/__init__.py"

[tool.hatch.build.targets.wheel]
packages = ["src/cuemsengine"]

[[tool.hatch.envs.hatch-test.matrix]]
python = ["3.11"]

[tool.hatch.envs.test]
dependencies = [
  "pytest",
  "pytest-cov",
  "pytest-mock",
  "coverage[toml]"
]
installer = "pip"

[tool.pytest.ini_options]
pythonpath = ["src"]
addopts = "-v"

[tool.hatch.metadata]
allow-direct-references = true

[tool.coverage.run]
source_pkgs = ["cuemsengine", "tests"]
branch = true
concurrency = ["multiprocessing"]
omit = []

[tool.coverage.paths]
cuemsengine = ["src/cuemsengine", "*/cuems-engine/src/cuemsengine"]
tests = ["tests", "*/cuems-engine/tests"]

[tool.coverage.report]
show_missing = true
exclude_lines = [
  "no cov",
  "if __name__ == .__main__.:",
  "if TYPE_CHECKING:",
]

[tool.hatch.envs.types]
extra-dependencies = [
  "mypy>=1.0.0"
]

[tool.hatch.envs.types.scripts]
check = "mypy --install-types --non-interactive {args:src/cuemsengine tests}"
